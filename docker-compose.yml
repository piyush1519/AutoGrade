services:
  nginx:
    image: nginx:alpine
    container_name: autograde-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend-node
    networks:
      - autograde-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autograde-frontend
    environment:
      - REACT_APP_API_URL=/api
    networks:
      - autograde-net
    restart: unless-stopped

  backend-node:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: autograde-node
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/autograde
      - PYTHON_SERVICE_URL=http://backend-python:8000
      - NODE_ENV=production
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - mongo
      - backend-python
    networks:
      - autograde-net
    restart: unless-stopped

  backend-python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    container_name: autograde-python
    environment:
      - PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - autograde-net
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: autograde-mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - autograde-net
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  autograde-net:
    driver: bridge
